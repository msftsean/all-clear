name: All Clear Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  ENVIRONMENT: test
  MOCK_MODE: "true"
  USE_MOCK_MODE: "true"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  clean-venv-pytest:
    name: Clean venv pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Create clean venv and install dependencies
        run: |
          python -m venv .venv-ci
          .venv-ci/bin/python -m pip install --upgrade pip
          .venv-ci/bin/python -m pip install -r requirements.txt

      - name: Run backend tests
        run: .venv-ci/bin/python -m pytest -q
