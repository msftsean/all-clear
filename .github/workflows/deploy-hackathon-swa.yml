name: Deploy Hackathon Site to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'hackathon-site/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'hackathon-site/**'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    outputs:
      deploy_url: ${{ steps.builddeploy.outputs.static_web_app_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HACKATHON_SITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "hackathon-site"
          output_location: "dist"
          # Don't hard-fail the pipeline before the SWA deploy token secret
          # (AZURE_STATIC_WEB_APPS_API_TOKEN_HACKATHON_SITE) is configured.
          skip_deploy_on_missing_secrets: true

  smoke_test:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    needs: build_and_deploy
    runs-on: ubuntu-latest
    name: Playwright Smoke Test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: hackathon-site
        run: npm ci

      - name: Install Playwright browser
        working-directory: hackathon-site
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: hackathon-site
        env:
          # Optional: repo secret HACKATHON_SITE_URL points at the stable
          # production site. Only use it on push to main (after the deploy has
          # promoted production). On PRs we test the local production build,
          # which is deterministic and not subject to ephemeral SWA preview
          # environments.
          BASE_URL: ${{ github.event_name == 'push' && secrets.HACKATHON_SITE_URL || '' }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "Testing local production build."
            unset BASE_URL
          else
            echo "Testing deployed site at $BASE_URL"
          fi
          npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: hackathon-site/playwright-report/
          retention-days: 7

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HACKATHON_SITE }}
          action: "close"
