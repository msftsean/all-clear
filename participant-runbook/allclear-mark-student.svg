<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="All Clear">
  <defs>
    <linearGradient id="ac-ring-s" x1="10" y1="54" x2="54" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- sweep ring: signals monitored, open at top-right where the latest signal enters -->
  <path d="M54.22 26.05 A23 23 0 1 1 41.72 11.16" stroke="url(#ac-ring-s)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- live signal node at the leading edge of the sweep -->
  <circle cx="41.72" cy="11.16" r="4" fill="#a3e635"/>
  <!-- all-clear check: many signals resolved to one cleared state -->
  <path d="M21 33 L29 41 L44 23" stroke="#a3e635" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
