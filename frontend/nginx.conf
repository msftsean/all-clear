server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SSE streaming endpoint — must come BEFORE general /api/ block
    # Disables proxy buffering so server-sent events reach the browser immediately
    location /api/phone/transcripts/stream {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;

        proxy_ssl_server_name on;

        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires keep-alive, NOT WebSocket upgrade
        proxy_set_header Connection "";

        # Disable all buffering/caching so events stream in real time
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 86400;
    }

    # WebSocket endpoint — needs Connection: upgrade
    location /api/realtime/ws {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;

        proxy_ssl_server_name on;

        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Regular API requests (REST) — no WebSocket upgrade headers
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;

        # SNI required for Azure Container Apps TLS routing
        proxy_ssl_server_name on;

        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
