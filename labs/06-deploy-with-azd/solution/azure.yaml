# Azure Developer CLI (azd) configuration for All Clear
# Lab 06: Deploy with azd - SOLUTION
# Run 'azd up' to provision infrastructure and deploy backend + frontend Container Apps.

name: all-clear
metadata:
  template: all-clear@0.1.0

services:
  backend:
    project: ./backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      remoteBuild: true

  frontend:
    project: ./frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile
      remoteBuild: true

infra:
  provider: bicep
  path: ./infra
  module: main

hooks:
  postdeploy:
    shell: sh
    run: |
      echo "=========================================="
      echo "All Clear deployment complete!"
      echo "=========================================="
      echo "Backend URL: ${AZURE_CONTAINERAPP_URL}"
      echo "Frontend URL: ${AZURE_FRONTEND_URL}"
      echo "API Health:  ${AZURE_CONTAINERAPP_URL}/api/health"
      echo "Signals API: ${AZURE_CONTAINERAPP_URL}/api/signals"
      echo "API Docs:    ${AZURE_CONTAINERAPP_URL}/docs"
      echo ""
      echo "To view backend logs, resolve the Container App tagged azd-service-name=backend,"
      echo "then run: az containerapp logs show --name <backend-app-name> --resource-group <resource-group> --follow"
      echo "=========================================="
